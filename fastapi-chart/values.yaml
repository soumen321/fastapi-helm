replicaCount: 2

image:
  repository: techsoumen/fastapi-demo
  pullPolicy: IfNotPresent
  tag: "v1"

service:
  type: NodePort
  port: 80
  targetPort: 8111

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fastapi.local
      paths:
        - path: /
          pathType: Prefix
  tls: []  

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""  

resources: {}

autoscaling:
  enabled: false