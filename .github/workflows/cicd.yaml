name: FastAPI CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-demo:${{ github.sha }} ./fastapi-app

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-demo:${{ github.sha }}

    - name: Clone Helm Repo
      run: |
        git clone https://${{ secrets.HELM_REPO_TOKEN }}@github.com/soumen321/fastapi-helm.git

    - name: Update Helm values.yaml
      run: |
        cd fastapi-helm/fastapi-chart
        # Increment chart version (patch bump)
        old_version=$(yq '.version' Chart.yaml)
        new_version=$(echo $old_version | awk -F. '{print $1"."$2"."$3+1}')
        yq -i ".version = \"$new_version\"" Chart.yaml

        # Update appVersion to short SHA
        short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
        yq -i ".appVersion = \"$short_sha\"" Chart.yaml

        # Update values.yaml tag
        yq -i ".image.tag = \"${{ github.sha }}\"" values.yaml


    - name: Commit and Push Changes
      run: |
        cd fastapi-helm
        git config --global user.email "actions@github.com"
        git config --global user.name "github-actions"
        git add fastapi-chart/values.yaml
        git commit -m "Update FastAPI image to ${{ github.sha }}" || echo "No changes to commit"
        git push